<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Sequence Game</title>
    <style>
        h1{
            color:Black;
            font-size: 25px;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }
        button{
            width :100px;
            height:50px;
            margin:10px;
            text-align: center;
        }
        #red{
            background-color: red;
        }
        #green{
            background-color: green;
        }
        #yellow{
            background-color: yellow;
        }
        #blue{
            background-color: blue;
        } 
        .active{
            opacity:0.5;
        }
    </style>
</head>
<body>
    <h1>JavaScript Application</h1>
    <div class="buttons">
        <button id="red">Click Me</button>
        <button id="blue">Click Me</button>
        <button id="green">Click Me</button>
        <button id="yellow">Click Me</button>
    </div>
    <div id="message"></div>
    <script src="script1.js"></script>
</body>
</html>
